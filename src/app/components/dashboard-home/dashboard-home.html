<div class="dashboard-home">
  <div class="role-selector" *ngIf="currentUser?.roles && currentUser!.roles.length > 1">
    <h3>Vali roll</h3>
    <div class="role-buttons">
      <button
        *ngFor="let role of currentUser!.roles"
        [class.active]="activeRole === role.name"
        (click)="setRole(role.name)"
      >
        {{ role.name }}
      </button>
    </div>
  </div>

  <div class="section" *ngIf="activeRole === RoleEnum.ADMIN">
    <h2>Admin paneel</h2>
    <div class="cards">
      <div class="card">Kasutajate haldus</div>
      <div class="card" routerLink="/dashboard/microchips/new">Mikrokiipide haldus</div>
      <div class="card">Tõugude haldus</div>
    </div>
  </div>

  <div class="section" *ngIf="activeRole === RoleEnum.VET">
    <h2>Veterinaari paneel</h2>
    <div class="cards">
      <div class="card">Loomade nimekiri</div>
      <div class="card">Terviseandmed</div>
    </div>
  </div>

  <div class="section" *ngIf="activeRole === RoleEnum.OWNER">
    <h2>Minu lemmikloomad</h2>
    <div class="cards">
      <div class="card" routerLink="/dashboard/pets">Minu loomad</div>
    </div>
  </div>
</div>
