<div class="content">
  <h2>Minu loomad</h2>

  <div *ngIf="loading">Laadimine...</div>
  <div *ngIf="error">{{ error }}</div>

  <div class="pet-grid" *ngIf="!loading && !error">
    <div class="pet-card" *ngFor="let pet of pets" (click)="togglePet(pet.id)">
      <h3>{{ pet.name }}</h3>
      <p>Liik: {{ pet.breed?.species?.name ?? 'Määramata' }}</p>

      <div class="pet-details" *ngIf="expandedPetId === pet.id">
        <p>Tõug: {{ pet.breed?.name ?? 'Määramata' }}</p>
        <p>Sugu: {{ pet.sex }}</p>
        <p>Sünniaeg: {{ pet.birthDate }}</p>
        <p>Staatus: {{ pet.status }}</p>
        <button
          *ngIf="pet.status !== 'LOST' && pet.status !== 'DECEASED'"
          (click)="markAsLost(pet, $event)"
          class="btn-lost"
        >
          Märgi kadunuks
        </button>
        <button
          *ngIf="pet.status !== 'DECEASED'"
          (click)="markAsDead(pet, $event)"
          class="btn-dead"
        >
          Märgi surnuks
        </button>
      </div>
    </div>

    <div *ngIf="pets.length === 0">Sul pole ühtegi looma registreeritud.</div>
  </div>
</div>
