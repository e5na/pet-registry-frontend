<div class="report-container">
  <div class="header-section">
    <h2>🐾 Loomade aruanne</h2>

    <div class="search-box">
      <input
        type="text"
        [(ngModel)]="searchTerm"
        (input)="onSearchChange()"
        placeholder="Otsi nime, tõu või kiibi järgi..."
      />
      <span class="search-count" *ngIf="!loading"> Leitud: {{ filteredPets.length }} </span>
    </div>
  </div>
  <div class="pet-grid">
    <div *ngFor="let pet of filteredPets" class="pet-card">
      <div class="card-header">
        <h3>
          {{ pet.name }} <span>({{ pet.sex === 'M' ? 'Isane' : 'Emane' }})</span>
        </h3>
        <span class="status-badge" [class]="'status-' + pet.status?.toLowerCase()">{{
          pet.status
        }}</span>
      </div>

      <div class="card-body">
        <p><strong>Sünniaeg:</strong> {{ pet.birthDate | date: 'dd.MM.yyyy' }}</p>
        <p><strong>Liik:</strong> {{ pet.breed.species.name }}</p>
        <p><strong>Tõug:</strong> {{ pet.breed.name }}</p>
        <div class="chip-info">
          <small>Mikrokiibi nr:</small>
          <code>{{ pet.microchip.microchipNumber }}</code>
        </div>
      </div>
    </div>
  </div>
</div>
